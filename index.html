<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Coin & Bomb Trolley</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            background: #34495e;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }
        #uiContainer {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            border: 4px solid #fff;
        }
        #gameOverScreen h1 {
            color: #e74c3c;
            font-size: 40px;
            margin-bottom: 10px;
        }
        #gameOverScreen p {
            font-size: 22px;
            margin-bottom: 20px;
        }
        #restartBtn {
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        #restartBtn:hover {
            background: #27ae60;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div id="uiContainer">
            <div>Score: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
        </div>

        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <p>Your Score: <span id="finalScore">0</span></p>
            <button id="restartBtn" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const levelEl = document.getElementById("level");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const finalScoreEl = document.getElementById("finalScore");

        let score = 0;
        let level = 1;
        let isGameOver = false;
        let baseSpeedMultiplier = 1;
        let spawnInterval = 1000;
        let lastSpawnTime = 0;

        // ट्रॉली (Player) Settings
        const trolley = {
            x: canvas.width / 2 - 40,
            y: canvas.height - 60,
            width: 80,
            height: 35,
            speed: 10
        };

        // गिरेने वाली चीज़ों की लिस्ट (Coins and Bombs)
        let items = [];
        let keys = {};

        // Controls
        window.addEventListener("keydown", (e) => keys[e.key] = true);
        window.addEventListener("keyup", (e) => keys[e.key] = false);

        canvas.addEventListener("touchmove", (e) => {
            if (isGameOver) return;
            let rect = canvas.getBoundingClientRect();
            let touchX = e.touches[0].clientX - rect.left;
            trolley.x = touchX - trolley.width / 2;
        });

        // नए आइटम्स पैदा करना (Gold, Silver, or Bomb)
        function spawnItem() {
            const rand = Math.random();
            let type, color, size, speedBonus, points;

            if (rand < 0.6) {
                // 60% चांस: गोल्ड कॉइन
                type = "gold";
                color = "#f1c40f"; // पीला
                size = 14;
                speedBonus = 2;
                points = 1;
            } else if (rand < 0.8) {
                // 20% चांस: सिल्वर कॉइन (तेज़ और ज़्यादा पॉइंट)
                type = "silver";
                color = "#3498db"; // नीला/चांदी
                size = 11;
                speedBonus = 4;
                points = 3;
            } else {
                // 20% चांस: बम!
                type = "bomb";
                color = "#000000"; // काला बम
                size = 16;
                speedBonus = 3;
                points = 0;
            }

            const x = Math.random() * (canvas.width - size * 2) + size;
            items.push({
                x: x,
                y: -20,
                type: type,
                color: color,
                size: size,
                points: points,
                speed: (Math.random() * 2 + speedBonus) * baseSpeedMultiplier
            });
        }

        // गेम अपडेट लॉजिक
        function update(time) {
            if (isGameOver) return;

            // ट्रॉली मूवमेंट
            if (keys["ArrowLeft"] || keys["a"]) trolley.x -= trolley.speed;
            if (keys["ArrowRight"] || keys["d"]) trolley.x += trolley.speed;

            // बाउंड्री लॉक
            if (trolley.x < 0) trolley.x = 0;
            if (trolley.x > canvas.width - trolley.width) trolley.x = canvas.width - trolley.width;

            // डिफिकल्टी / लेवल बढ़ाना (हर 10 पॉइंट पर स्पीड बढ़ेगी)
            let currentLevel = Math.floor(score / 10) + 1;
            if (currentLevel !== level) {
                level = currentLevel;
                levelEl.innerText = level;
                baseSpeedMultiplier = 1 + (level - 1) * 0.25; // 25% स्पीड बढ़ेगी हर लेवल पर
                spawnInterval = Math.max(400, 1000 - (level - 1) * 100); // सिक्के जल्दी-जल्दी गिरेंगे
            }

            // रैंडम टाइम पर स्पॉन करना
            if (time - lastSpawnTime > spawnInterval) {
                spawnItem();
                lastSpawnTime = time;
            }

            // आइटम्स की मूवमेंट और टकराव
            for (let i = items.length - 1; i >= 0; i--) {
                items[i].y += items[i].speed;

                // ट्रॉली से टकराव (Collision)
                if (
                    items[i].x + items[i].size > trolley.x &&
                    items[i].x - items[i].size < trolley.x + trolley.width &&
                    items[i].y + items[i].size > trolley.y &&
                    items[i].y - items[i].size < trolley.y + trolley.height
                ) {
                    if (items[i].type === "bomb") {
                        endGame();
                    } else {
                        score += items[i].points;
                        scoreEl.innerText = score;
                    }
                    items.splice(i, 1);
                    continue;
                }

                // स्क्रीन से बाहर जाने पर हटाना
                if (items[i].y > canvas.height + 20) {
                    items.splice(i, 1);
                }
            }
        }

        // स्क्रीन पर ड्रा करना
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ट्रॉली ड्रा करें (लाल रंग की सुंदर बकेट)
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(trolley.x, trolley.y, trolley.width, trolley.height);
            // ट्रॉली का ऊपरी हिस्सा
            ctx.fillStyle = "#c0392b";
            ctx.fillRect(trolley.x, trolley.y, trolley.width, 5);

            // कॉइन्स और बम ड्रा करें
            items.forEach(item => {
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
                ctx.fillStyle = item.color;
                ctx.fill();
                ctx.closePath();

                // बम पर छोटा सा लाल डॉट (FUSE) दिखाने के लिए
                if (item.type === "bomb") {
                    ctx.beginPath();
                    ctx.arc(item.x - 4, item.y - 4, 3, 0, Math.PI * 2);
                    ctx.fillStyle = "#e74c3c";
                    ctx.fill();
                    ctx.closePath();
                }
            });
        }

        // मेन गेम लूप
        function gameLoop(time) {
            update(time);
            draw();
            requestAnimationFrame(gameLoop);
        }

        // गेम ओवर
        function endGame() {
            isGameOver = true;
            finalScoreEl.innerText = score;
            gameOverScreen.style.display = "flex";
        }

        // रीस्टार्ट गेम
        function resetGame() {
            score = 0;
            level = 1;
            baseSpeedMultiplier = 1;
            spawnInterval = 1000;
            items = [];
            isGameOver = false;
            trolley.x = canvas.width / 2 - 40;
            scoreEl.innerText = score;
            levelEl.innerText = level;
            gameOverScreen.style.display = "none";
        }

        // पहली बार गेम शुरू करने के लिए
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
