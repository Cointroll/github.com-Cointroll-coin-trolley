<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Trolley</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #0b0f1a;
            font-family: 'Georgia', 'Times New Roman', serif;
            touch-action: none;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #0b0f1a 0%, #131a2e 55%, #1c1430 100%);
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 18px 22px;
            pointer-events: none;
            z-index: 10;
        }
        .hud-block { color: #f4e4c1; }
        .hud-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #9a8968; margin-bottom: 2px; display: block; }
        .hud-value { font-size: 28px; font-weight: bold; text-shadow: 0 0 12px rgba(255, 212, 94, 0.4); }
        
        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 40%, rgba(28,20,48,0.92), rgba(11,15,26,0.97));
            z-index: 20;
            text-align: center;
            padding: 24px;
            color: #f4e4c1;
        }
        #overlay.hidden { display: none; }
        #overlay h1 { font-size: 32px; color: #ff4757; margin-bottom: 12px; letter-spacing: 1px; }
        #overlay p { font-size: 18px; margin-bottom: 24px; color: #9a8968; }
        #restartBtn {
            padding: 14px 32px;
            font-size: 16px;
            font-weight: bold;
            background: #ffd45e;
            color: #0b0f1a;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 212, 94, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-block">
            <span class="hud-label">Score</span>
            <span id="score" class="hud-value">0</span>
        </div>
        <div class="hud-block" style="text-align: right;">
            <span class="hud-label">Level</span>
            <span id="level" class="hud-value">1</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay" class="hidden">
        <h1>GAME OVER</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button id="restartBtn" onclick="resetGame()">Try Again</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const levelEl = document.getElementById("level");
        const overlay = document.getElementById("overlay");
        const finalScoreEl = document.getElementById("finalScore");

        let score = 0;
        let level = 1;
        let isGameOver = false;
        let speedMultiplier = 1;
        let lastSpawnTime = 0;
        let spawnInterval = 1000;

        // तुम्हारी पुरानी ट्रॉली का साइज और पोजीशन
        const trolley = {
            x: 0,
            y: 0,
            width: 80,
            height: 16,
            speed: 14
        };

        let items = [];
        let keys = {};

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            trolley.y = canvas.height - 80; // जमीन से परफेक्ट दूरी पर ट्रॉली
            if (trolley.x === 0) trolley.x = canvas.width / 2 - trolley.width / 2;
        }

        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("keydown", (e) => keys[e.key] = true);
        window.addEventListener("keyup", (e) => keys[e.key] = false);

        // तुम्हारा ओरिजिनल सुपर स्मूथ टच कंट्रोल
        window.addEventListener("touchmove", (e) => {
            if (isGameOver) return;
            let touchX = e.touches[0].clientX;
            trolley.x = touchX - trolley.width / 2;
        });

        function spawnItem() {
            const rand = Math.random();
            let type, color, size, points;

            if (rand < 0.80) {
                // 80% सिक्के गिरेंगे
                type = "coin";
                color = "#ffd45e"; // तुम्हारा वही पुराना चमकीला गोल्ड कॉइन
                size = 12;
                points = 1;
            } else {
                // 20% लाल खतरे वाले डॉट्स गिरेंगे
                type = "bomb";
                color = "#ff4757"; // लाल खतरा
                size = 14;
                points = 0;
            }

            const x = Math.random() * (canvas.width - size * 2) + size;
            // जैसे-जैसे लेवल बढ़ेगा, गिरने की स्पीड थोड़ी बढ़ेगी
            const fallSpeed = (Math.random() * 2 + 4) * speedMultiplier; 
            
            items.push({ x, y: -20, type, color, size, speed: fallSpeed, points });
        }

        function update(time) {
            if (isGameOver) return;

            // कीबोर्ड सपोर्ट
            if (keys["ArrowLeft"] || keys["a"]) trolley.x -= trolley.speed;
            if (keys["ArrowRight"] || keys["d"]) trolley.x += trolley.speed;

            if (trolley.x < 0) trolley.x = 0;
            if (trolley.x > canvas.width - trolley.width) trolley.x = canvas.width - trolley.width;

            // हर 10 पॉइंट पर गेम का लेवल और स्पीड थोड़ी बढ़ेगी
            let currentLevel = Math.floor(score / 10) + 1;
            if (currentLevel !== level) {
                level = currentLevel;
                levelEl.innerText = level;
                speedMultiplier = 1 + (level - 1) * 0.15;
                spawnInterval = Math.max(500, 1000 - (level - 1) * 50);
            }

            if (time - lastSpawnTime > spawnInterval) {
                spawnItem();
                lastSpawnTime = time;
            }

            for (let i = items.length - 1; i >= 0; i--) {
                items[i].y += items[i].speed;

                // परफेक्ट कोलिशन डिटेक्शन (टकराव)
                if (
                    items[i].x + items[i].size > trolley.x &&
                    items[i].x - items[i].size < trolley.x + trolley.width &&
                    items[i].y + items[i].size > trolley.y &&
                    items[i].y - items[i].size < trolley.y + trolley.height
                ) {
                    if (items[i].type === "bomb") {
                        endGame();
                    } else {
                        score += items[i].points;
                        scoreEl.innerText = score;
                    }
                    items.splice(i, 1);
                    continue;
                }

                if (items[i].y > canvas.height + 20) {
                    items.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // तुम्हारी ओरिजिनल ट्रॉली का लुक (क्लीन और मैचिंग थीम में)
            ctx.fillStyle = "#f4e4c1";
            ctx.fillRect(trolley.x, trolley.y, trolley.width, trolley.height);

            // सिक्के और लाल डॉट्स ड्रा करना
            items.forEach(item => {
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
                ctx.fillStyle = item.color;
                ctx.fill();
                ctx.closePath();
            });
        }

        function gameLoop(time) {
            update(time);
            draw();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isGameOver = true;
            finalScoreEl.innerText = score;
            overlay.classList.remove("hidden");
        }

        function resetGame() {
            score = 0;
            level = 1;
            speedMultiplier = 1;
            spawnInterval = 1000;
            items = [];
            isGameOver = false;
            trolley.x = canvas.width / 2 - trolley.width / 2;
            scoreEl.innerText = score;
            levelEl.innerText = level;
            overlay.classList.add("hidden");
        }

        resizeCanvas();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
