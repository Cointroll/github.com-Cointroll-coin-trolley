<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Trolley - Upgraded</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #0b0f19;
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: none;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #0b0f1a 0%, #131a2e 55%, #1c1430 100%);
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            padding: 18px 22px;
            pointer-events: none;
            z-index: 10;
            color: #f4e4c1;
        }
        .hud-block { display: flex; flex-direction: column; }
        .hud-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #9a8968; margin-bottom: 2px; }
        .hud-value { font-size: 28px; font-weight: bold; text-shadow: 0 0 12px rgba(255, 212, 94, 0.4); }
        
        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(11, 15, 26, 0.85);
            z-index: 20;
            color: white;
            text-align: center;
            padding: 24px;
        }
        #overlay.hidden { display: none; }
        #overlay h1 { color: #e74c3c; font-size: 36px; margin-bottom: 10px; }
        #overlay p { font-size: 18px; margin-bottom: 20px; color: #a0aec0; }
        #restartBtn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #f1c40f;
            color: #0b0f19;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4);
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-block">
            <span class="hud-label">Score</span>
            <span id="score" class="hud-value">0</span>
        </div>
        <div class="hud-block" style="text-align: right;">
            <span class="hud-label">Level</span>
            <span id="level" class="hud-value">1</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay" class="hidden">
        <h1 id="overlayTitle">GAME OVER</h1>
        <p>You hit a bomb! Final Score: <span id="finalScore">0</span></p>
        <button id="restartBtn" onclick="resetGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const levelEl = document.getElementById("level");
        const overlay = document.getElementById("overlay");
        const finalScoreEl = document.getElementById("finalScore");

        let score = 0;
        let level = 1;
        let isGameOver = false;
        let baseSpeedMultiplier = 1;
        let lastSpawnTime = 0;
        let spawnInterval = 900;

        // स्क्रीन साइज के हिसाब से कैनवास सेट करना (बिल्कुल पहले जैसा फुल स्क्रीन)
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            trolley.y = canvas.height - 70;
        }

        const trolley = {
            x: window.innerWidth / 2 - 45,
            y: window.innerHeight - 70,
            width: 90,
            height: 25,
            speed: 12
        };

        let items = [];
        let keys = {};

        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("keydown", (e) => keys[e.key] = true);
        window.addEventListener("keyup", (e) => keys[e.key] = false);

        // एकदम स्मूथ टच कंट्रोल (जैसे पहले था)
        canvas.addEventListener("touchmove", (e) => {
            if (isGameOver) return;
            let touchX = e.touches[0].clientX;
            trolley.x = touchX - trolley.width / 2;
        });

        function spawnItem() {
            const rand = Math.random();
            let type, color, size, speed, points;

            if (rand < 0.75) {
                // 75% चांस: कॉइन
                type = "coin";
                color = "#ffd45e"; // चमकीला सोने जैसा रंग
                size = 14;
                speed = (Math.random() * 2 + 3) * baseSpeedMultiplier;
                points = 1;
            } else {
                // 25% चांस: बम
                type = "bomb";
                color = "#ff4757"; // लाल-काला खतरनाक बम
                size = 16;
                speed = (Math.random() * 2 + 4) * baseSpeedMultiplier;
                points = 0;
            }

            const x = Math.random() * (canvas.width - size * 2) + size;
            items.push({ x, y: -20, type, color, size, speed, points });
        }

        function update(time) {
            if (isGameOver) return;

            if (keys["ArrowLeft"] || keys["a"]) trolley.x -= trolley.speed;
            if (keys["ArrowRight"] || keys["d"]) trolley.x += trolley.speed;

            if (trolley.x < 0) trolley.x = 0;
            if (trolley.x > canvas.width - trolley.width) trolley.x = canvas.width - trolley.width;

            // लेवल और स्पीड बढ़ाना (हर 8 पॉइंट पर थोड़ा तेज़ होगा)
            let currentLevel = Math.floor(score / 8) + 1;
            if (currentLevel !== level) {
                level = currentLevel;
                levelEl.innerText = level;
                baseSpeedMultiplier = 1 + (level - 1) * 0.2;
                spawnInterval = Math.max(450, 900 - (level - 1) * 80);
            }

            if (time - lastSpawnTime > spawnInterval) {
                spawnItem();
                lastSpawnTime = time;
            }

            for (let i = items.length - 1; i >= 0; i--) {
                items[i].y += items[i].speed;

                // टकराव (Collision)
                if (
                    items[i].x + items[i].size > trolley.x &&
                    items[i].x - items[i].size < trolley.x + trolley.width &&
                    items[i].y + items[i].size > trolley.y &&
                    items[i].y - items[i].size < trolley.y + trolley.height
                ) {
                    if (items[i].type === "bomb") {
                        endGame();
                    } else {
                        score += items[i].points;
                        scoreEl.innerText = score;
                    }
                    items.splice(i, 1);
                    continue;
                }

                if (items[i].y > canvas.height + 20) {
                    items.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // पुरानी ट्रॉली जैसा डिज़ाइन
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(trolley.x, trolley.y, trolley.width, trolley.height);

            // आइटम्स ड्रा करना
            items.forEach(item => {
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
                ctx.fillStyle = item.color;
                ctx.fill();
                ctx.closePath();

                // अगर बम है तो उसके अंदर एक छोटा सा ब्लैक डॉट डिज़ाइन के लिए
                if (item.type === "bomb") {
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.size/2, 0, Math.PI * 2);
                    ctx.fillStyle = "#1e2229";
                    ctx.fill();
                    ctx.closePath();
                }
            });
        }

        function gameLoop(time) {
            update(time);
            draw();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isGameOver = true;
            finalScoreEl.innerText = score;
            overlay.classList.remove("hidden");
        }

        function resetGame() {
            score = 0;
            level = 1;
            baseSpeedMultiplier = 1;
            spawnInterval = 900;
            items = [];
            isGameOver = false;
            trolley.x = canvas.width / 2 - 45;
            scoreEl.innerText = score;
            levelEl.innerText = level;
            overlay.classList.add("hidden");
        }

        // स्टार्ट करने के लिए
        resizeCanvas();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
